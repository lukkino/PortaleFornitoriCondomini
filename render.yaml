services:
  - type: web
    name: portale-fornitori-condomini-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: ALLOWED_ORIGINS
        sync: false          # es. https://<il-tuo-frontend>.onrender.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: onboarding@resend.dev   # sostituire con dominio verificato su Resend
      - key: FRONTEND_URL
        sync: false          # es. https://<il-tuo-frontend>.onrender.com
    healthCheckPath: /api/health

  - type: web
    name: portale-fornitori-condomini-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false          # es. https://portale-fornitori-condomini-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
